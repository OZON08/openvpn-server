---
services:
    openvpn:
        container_name: openvpn
        # If you want to build your own image with docker-compose, uncomment the next line, comment the "image:" line and run "docker-compose build" following by "docker-compose up -d"
        # build: .
        image: ozon08/openvpn-server:latest
        privileged: true
        ports:
            - "1194:1194/udp"   # openvpn UDP port
            # - "1194:1194/tcp"   # openvpn TCP port
            # - "2080:2080/tcp"  # management port. uncomment if you would like to share it with the host
        environment:
            TRUST_SUB: "10.0.70.0/24"
            GUEST_SUB: "10.0.71.0/24"
            HOME_SUB: "192.168.88.0/24"
            # openvpn-ui v0.9.7+ client-disconnect webhook. Uncomment both
            # lines and set OPENVPN_UI_HOOK_TOKEN in .env to the same value
            # as OPENVPN_UI_MONITORING_HOOK_TOKEN on the openvpn-ui service.
            # Also uncomment the `client-disconnect` line in server.conf.
            # OPENVPN_UI_URL: "http://openvpn-ui:8080"
            # OPENVPN_UI_HOOK_TOKEN: "${OPENVPN_UI_HOOK_TOKEN:-}"
        volumes:
            - ./pki:/etc/openvpn/pki
            - ./clients:/etc/openvpn/clients
            - ./config:/etc/openvpn/config
            - ./staticclients:/etc/openvpn/staticclients
            - ./log:/var/log/openvpn
            - ./fw-rules.sh:/opt/app/fw-rules.sh
            - ./checkpsw.sh:/opt/app/checkpsw.sh
            - ./server.conf:/etc/openvpn/server.conf
        cap_add:
            - NET_ADMIN
        restart: always
        healthcheck:
            test: ["CMD", "bash", "-c", "echo '' > /dev/tcp/127.0.0.1/2080"]
            interval: 30s
            timeout: 5s
            retries: 3
            # First start generates the PKI including 4096-bit DH parameters,
            # which can take 5-15 minutes on slower hardware. Subsequent starts
            # complete within seconds because PKI is persisted in the volume.
            start_period: 900s

    openvpn-ui:
        container_name: openvpn-ui
        image: ozon08/openvpn-ui:latest
        environment:
            - OPENVPN_ADMIN_USERNAME=${OPENVPN_ADMIN_USERNAME}
            - OPENVPN_ADMIN_PASSWORD=${OPENVPN_ADMIN_PASSWORD}
        ports:
            - "8080:8080/tcp"
        volumes:
            - ./:/etc/openvpn
            - ./db:/opt/openvpn-ui/db
            - ./pki:/usr/share/easy-rsa/pki
            - /var/run/docker.sock:/var/run/docker.sock:ro
        restart: always
        healthcheck:
            test: ["CMD", "wget", "-qO/dev/null", "http://localhost:8080"]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 15s
        depends_on:
            openvpn:
                condition: service_healthy
